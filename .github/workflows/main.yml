name: LaTeX to PDF on Github

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_pdfs:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Vorlesungen (Lectures)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: Vorlesungen
          root_file: "lecture-*.tex"
          args: "-shell-escape -interaction=nonstopmode"
          extra_system_packages: "py3-pygments"
        continue-on-error: true

      - name: Compile Uebungen (Exercises)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: Uebungen
          root_file: "uebung-*.tex"
          args: "-shell-escape -interaction=nonstopmode"
          extra_system_packages: "py3-pygments"
        continue-on-error: true

      - name: Upload Compiled PDFs
        uses: actions/upload-artifact@v4
        with:
          name: All-Lecture-and-Exercise-PDFs
          path: |
            Vorlesungen/*.pdf
            Uebungen/*.pdf
